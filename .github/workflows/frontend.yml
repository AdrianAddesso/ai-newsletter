name: Frontend CI

on:
  workflow_dispatch:
  push:
    branches: [main, staging]
    paths:
      - 'frontend/**'
      - 'packages/shared/**'
      - '.github/workflows/frontend.yml'
  pull_request:
    branches: [main, staging]
    paths:
      - 'frontend/**'
      - 'packages/shared/**'
      - '.github/workflows/frontend.yml'

jobs:
  frontend:
    runs-on: ubuntu-latest
    env:
      NODE_VERSION: 20
      PNPM_VERSION: 10.33.2
      IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/ai-newsletter-frontend

    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v6
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install frontend dependencies
        run: pnpm --dir frontend install --frozen-lockfile --ignore-workspace

      - name: Build frontend app
        run: pnpm --dir frontend run build

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Prepare Docker tags
        id: docker_tags
        shell: bash
        run: |
          tags="${IMAGE_NAME}:${GITHUB_SHA}"

          if [ "${GITHUB_EVENT_NAME}" = "push" ]; then
            if [ "${GITHUB_REF_NAME}" = "main" ]; then
              tags="${tags}"$'\n'"${IMAGE_NAME}:latest"
            elif [ "${GITHUB_REF_NAME}" = "staging" ]; then
              tags="${tags}"$'\n'"${IMAGE_NAME}:staging"
              tags="${tags}"$'\n'"${IMAGE_NAME}:staging-${GITHUB_SHA}"
            fi
          fi

          {
            echo 'tags<<EOF'
            echo "${tags}"
            echo 'EOF'
          } >> "${GITHUB_OUTPUT}"

      - name: Build and optionally push frontend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./frontend/Dockerfile
          build-args: |
            PNPM_VERSION=${{ env.PNPM_VERSION }}
            VITE_API_URL=/api
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.docker_tags.outputs.tags }}
