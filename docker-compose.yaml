services:
  postgres:
    image: postgres:16
    platform: linux/arm64
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    restart: unless-stopped
    env_file:
      - .env
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data

  minio-init:
    image: minio/mc:latest
    depends_on:
      - minio
    restart: "no"
    env_file:
      - .env
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD}; do
        sleep 2;
      done;
      mc mb --ignore-existing local/${S3_ASSETS_BUCKET};
      mc mb --ignore-existing local/${S3_FONTS_BUCKET};
      mc mb --ignore-existing local/${S3_EXPORTS_BUCKET};
      "

  assets-seed:
    profiles: ["seed"]
    build:
      context: .
      dockerfile: backend/Dockerfile
    command: pnpm run assets:seed-minio
    restart: "no"
    depends_on:
      - postgres
      - minio
      - minio-init
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      DIRECT_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      OBJECT_STORAGE_ENDPOINT: http://minio:9000
      OBJECT_STORAGE_PUBLIC_ENDPOINT: http://localhost:${MINIO_API_PORT:-9000}
      OBJECT_STORAGE_REGION: us-east-1
      OBJECT_STORAGE_ASSETS_BUCKET: ${S3_ASSETS_BUCKET}
      OBJECT_STORAGE_FONTS_BUCKET: ${S3_FONTS_BUCKET}
      OBJECT_STORAGE_EXPORTS_BUCKET: ${S3_EXPORTS_BUCKET}
      OBJECT_STORAGE_ACCESS_KEY: ${MINIO_ROOT_USER}
      OBJECT_STORAGE_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      OBJECT_STORAGE_FORCE_PATH_STYLE: "true"
      AI_PROVIDER_URL: ${AI_PROVIDER_URL}
      AI_PROVIDER_MODEL: ${AI_PROVIDER_MODEL}

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "3000:3000"
    depends_on:
      - postgres
      - minio
      - minio-init
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      DIRECT_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      AI_PROVIDER_CLIENT_ID: ${AI_PROVIDER_CLIENT_ID:-}
      AI_PROVIDER_CLIENT_SECRET: ${AI_PROVIDER_CLIENT_SECRET:-}
      AI_PROVIDER_URL: ${AI_PROVIDER_URL}
      AI_PROVIDER_MODEL: ${AI_PROVIDER_MODEL}
      OBJECT_STORAGE_ENDPOINT: http://minio:9000
      OBJECT_STORAGE_PUBLIC_ENDPOINT: http://localhost:${MINIO_API_PORT:-9000}
      OBJECT_STORAGE_REGION: us-east-1
      OBJECT_STORAGE_ASSETS_BUCKET: ${S3_ASSETS_BUCKET}
      OBJECT_STORAGE_FONTS_BUCKET: ${S3_FONTS_BUCKET}
      OBJECT_STORAGE_EXPORTS_BUCKET: ${S3_EXPORTS_BUCKET}
      OBJECT_STORAGE_ACCESS_KEY: ${MINIO_ROOT_USER}
      OBJECT_STORAGE_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      OBJECT_STORAGE_FORCE_PATH_STYLE: "true"
      OAUTH_CLIENT_ID: ${OAUTH_CLIENT_ID:-}
      OAUTH_CLIENT_SECRET: ${OAUTH_CLIENT_SECRET:-}
      OAUTH_REDIRECT_URI: ${OAUTH_REDIRECT_URI:-}
      FRONTEND_URL: ${FRONTEND_URL:-}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-}
      ACCESS_TOKEN_TTL_MIN: ${ACCESS_TOKEN_TTL_MIN:-}
      REFRESH_TOKEN_TTL_DAYS: ${REFRESH_TOKEN_TTL_DAYS:-}
      AUTH_ALLOWED_EMAIL_DOMAINS: ${AUTH_ALLOWED_EMAIL_DOMAINS:-}
      AUTH_COOKIE_SECURE: ${AUTH_COOKIE_SECURE:-}
      AUTH_COOKIE_SAMESITE: ${AUTH_COOKIE_SAMESITE:-}
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api}
    env_file:
      - .env
    ports:
      - "5173:80"
    depends_on:
      - backend
    environment:
      VITE_BACKEND_URL: ${VITE_BACKEND_URL:-}

volumes:
  postgres_data:
  minio_data:
