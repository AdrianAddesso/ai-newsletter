services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    env_file:
      - .env.deploy
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    restart: unless-stopped
    env_file:
      - .env.deploy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "${MINIO_API_PORT}:9000"
      - "${MINIO_CONSOLE_PORT}:9001"
    volumes:
      - minio_data:/data

  minio-init:
    image: minio/mc:latest
    depends_on:
      - minio
    restart: "no"
    env_file:
      - .env.deploy
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD}; do
        sleep 2;
      done;
      mc mb --ignore-existing local/${S3_ASSETS_BUCKET};
      mc mb --ignore-existing local/${S3_FONTS_BUCKET};
      mc mb --ignore-existing local/${S3_EXPORTS_BUCKET};
      "

  assets-seed:
    profiles: ["seed"]
    image: ${DOCKERHUB_USERNAME}/ai-newsletter-backend:${APP_VERSION}
    command: pnpm run assets:seed-minio
    restart: "no"
    depends_on:
      - postgres
      - minio
      - minio-init
    env_file:
      - .env.deploy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      DIRECT_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      OBJECT_STORAGE_ENDPOINT: http://minio:9000
      OBJECT_STORAGE_PUBLIC_ENDPOINT: ${OBJECT_STORAGE_PUBLIC_ENDPOINT}
      OBJECT_STORAGE_REGION: ${OBJECT_STORAGE_REGION}
      OBJECT_STORAGE_ASSETS_BUCKET: ${OBJECT_STORAGE_ASSETS_BUCKET}
      OBJECT_STORAGE_FONTS_BUCKET: ${OBJECT_STORAGE_FONTS_BUCKET}
      OBJECT_STORAGE_EXPORTS_BUCKET: ${OBJECT_STORAGE_EXPORTS_BUCKET}
      OBJECT_STORAGE_ACCESS_KEY: ${MINIO_ROOT_USER}
      OBJECT_STORAGE_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      AI_PROVIDER_URL: ${AI_PROVIDER_URL}
      AI_PROVIDER_MODEL: ${AI_PROVIDER_MODEL}
      OBJECT_STORAGE_FORCE_PATH_STYLE: "true"

  backend:
    image: ${DOCKERHUB_USERNAME}/ai-newsletter-backend:${APP_VERSION}
    restart: unless-stopped
    depends_on:
      - postgres
      - minio
      - minio-init
    env_file:
      - .env.deploy
    expose:
      - "3000"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      DIRECT_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      NODE_ENV: production
      AI_PROVIDER_CLIENT_ID: ${AI_PROVIDER_CLIENT_ID}
      AI_PROVIDER_CLIENT_SECRET: ${AI_PROVIDER_CLIENT_SECRET}
      AI_PROVIDER_URL: ${AI_PROVIDER_URL}
      AI_PROVIDER_MODEL: ${AI_PROVIDER_MODEL}
      OBJECT_STORAGE_ENDPOINT: http://minio:9000
      OBJECT_STORAGE_PUBLIC_ENDPOINT: ${OBJECT_STORAGE_PUBLIC_ENDPOINT}
      OBJECT_STORAGE_REGION: ${OBJECT_STORAGE_REGION}
      OBJECT_STORAGE_ASSETS_BUCKET: ${OBJECT_STORAGE_ASSETS_BUCKET}
      OBJECT_STORAGE_FONTS_BUCKET: ${OBJECT_STORAGE_FONTS_BUCKET}
      OBJECT_STORAGE_EXPORTS_BUCKET: ${OBJECT_STORAGE_EXPORTS_BUCKET}
      OBJECT_STORAGE_ACCESS_KEY: ${MINIO_ROOT_USER}
      OBJECT_STORAGE_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      OBJECT_STORAGE_FORCE_PATH_STYLE: "true"
      OAUTH_CLIENT_ID: ${OAUTH_CLIENT_ID}
      OAUTH_CLIENT_SECRET: ${OAUTH_CLIENT_SECRET}
      OAUTH_REDIRECT_URI: ${OAUTH_REDIRECT_URI}
      FRONTEND_URL: ${FRONTEND_URL}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      ACCESS_TOKEN_TTL_MIN: ${ACCESS_TOKEN_TTL_MIN}
      REFRESH_TOKEN_TTL_DAYS: ${REFRESH_TOKEN_TTL_DAYS}
      AUTH_ALLOWED_EMAIL_DOMAINS: ${AUTH_ALLOWED_EMAIL_DOMAINS}
      AUTH_COOKIE_SECURE: ${AUTH_COOKIE_SECURE}
      AUTH_COOKIE_SAMESITE: ${AUTH_COOKIE_SAMESITE}

  frontend:
    image: ${DOCKERHUB_USERNAME}/ai-newsletter-frontend:${APP_VERSION}
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT}:80"

volumes:
  postgres_data:
  minio_data:
